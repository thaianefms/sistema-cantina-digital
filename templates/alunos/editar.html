{% extends 'base.html' %}

{% block title %}Editar Aluno - Sistema Cantina Digital{% endblock %}

{% block content %}
<h2>✏️ Editar Aluno</h2>

<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" value="{{ aluno.nome }}" required>
        </div>
        
        <div class="form-group">
            <label for="matricula">Matrícula:</label>
            <input type="text" id="matricula" name="matricula" value="{{ aluno.matricula }}" required>
        </div>
        
        <div class="form-group">
            <label for="turma">Turma:</label>
            <input type="text" id="turma" name="turma" value="{{ aluno.turma }}" required>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Salvar Alterações</button>
            <a href="{% url 'listar_alunos' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
