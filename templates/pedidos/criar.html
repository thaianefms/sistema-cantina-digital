{% extends 'base.html' %}

{% block title %}Criar Pedido - Sistema Cantina Digital{% endblock %}

{% block content %}
<h2>➕ Criar Novo Pedido</h2>

<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="aluno">Aluno:</label>
            <select id="aluno" name="aluno" required>
                <option value="">-- Selecione um aluno --</option>
                {% for aluno in alunos %}
                <option value="{{ aluno.id }}">{{ aluno.nome }} ({{ aluno.matricula }})</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="alimento">Alimento:</label>
            <select id="alimento" name="alimento" required>
                <option value="">-- Selecione um alimento --</option>
                {% for alimento in alimentos %}
                <option value="{{ alimento.id }}">{{ alimento.nome }} - R$ {{ alimento.preco|floatformat:2 }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="quantidade">Quantidade:</label>
            <input type="number" id="quantidade" name="quantidade" min="1" value="1" required>
        </div>
        
        <div class="form-group">
            <label for="forma_pagamento">Forma de Pagamento:</label>
            <select id="forma_pagamento" name="forma_pagamento" required>
                <option value="">-- Selecione uma forma --</option>
                {% for forma in formas_pagamento %}
                <option value="{{ forma.id }}">{{ forma.get_tipo_display }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="status">Status do Pedido:</label>
            <select id="status" name="status" required>
                <option value="pendente" selected>⏳ Pendente</option>
                <option value="preparando">👨‍🍳 Preparando</option>
                <option value="pronto">✓ Pronto</option>
                <option value="entregue">✓✓ Entregue</option>
            </select>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Salvar Pedido</button>
            <a href="{% url 'listar_pedidos' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script>
    // Script para calcular o total quando o alimento ou quantidade mudam
    document.getElementById('alimento').addEventListener('change', calcularTotal);
    document.getElementById('quantidade').addEventListener('change', calcularTotal);
    
    function calcularTotal() {
        const alimentoSelect = document.getElementById('alimento');
        const quantidadeInput = document.getElementById('quantidade');
        
        if (alimentoSelect.value && quantidadeInput.value) {
            const selectedOption = alimentoSelect.options[alimentoSelect.selectedIndex];
            const preco = parseFloat(selectedOption.text.split('R$ ')[1]);
            const quantidade = parseInt(quantidadeInput.value);
            const total = (preco * quantidade).toFixed(2);
            
            // Se houver um elemento para mostrar o total, mostra
            let totalElement = document.getElementById('total-display');
            if (!totalElement) {
                totalElement = document.createElement('div');
                totalElement.id = 'total-display';
                totalElement.style.cssText = 'margin-top: 20px; padding: 15px; background-color: #ecf0f1; border-radius: 5px; font-size: 18px; font-weight: bold;';
                document.querySelector('.form-card form').appendChild(totalElement);
            }
            totalElement.textContent = `Total: R$ ${total}`;
        }
    }
</script>
{% endblock %}
