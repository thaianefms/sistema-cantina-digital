{% extends 'base.html' %}

{% block title %}Editar Alimento - Sistema Cantina Digital{% endblock %}

{% block content %}
<h2>✏️ Editar Alimento</h2>

<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="nome">Nome do Alimento:</label>
            <input type="text" id="nome" name="nome" value="{{ alimento.nome }}" required>
        </div>
        
        <div class="form-group">
            <label for="quantidade_disponivel">Quantidade Disponível:</label>
            <input type="number" id="quantidade_disponivel" name="quantidade_disponivel" value="{{ alimento.quantidade_disponivel }}" min="0" required>
        </div>
        
        <div class="form-group">
            <label for="preco">Preço (R$):</label>
            <input type="number" id="preco" name="preco" value="{{ alimento.preco }}" step="0.01" min="0" required>
        </div>
        
        <div class="form-group">
            <label for="ativo">
                <input type="checkbox" id="ativo" name="ativo" {% if alimento.ativo %}checked{% endif %}>
                Ativo
            </label>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Salvar Alterações</button>
            <a href="{% url 'listar_alimentos' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
