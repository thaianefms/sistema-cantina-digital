{% extends 'base.html' %}

{% block title %}Criar Forma de Pagamento - Sistema Cantina Digital{% endblock %}

{% block content %}
<h2>➕ Criar Nova Forma de Pagamento</h2>

<div class="form-card">
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
    <label for="tipo">Tipo de Pagamento:</label>
    <select id="tipo" name="tipo" required>
        <option value="">-- Selecione --</option>
        <option value="vale_lanche">Vale-Lanche</option>
        <option value="vale_bebida">Vale-Bebida</option>
        <option value="pix">PIX</option>
    </select>
</div>
        
        <div class="form-group">
            <label for="descricao">Descrição:</label>
            <textarea id="descricao" name="descricao" placeholder="Descreva a forma de pagamento..."></textarea>
        </div>
        
        <div class="form-group">
            <label for="ativo">
                <input type="checkbox" id="ativo" name="ativo" checked>
                Ativo
            </label>
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Salvar Forma</button>
            <a href="{% url 'listar_pagamentos' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
