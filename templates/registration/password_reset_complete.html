<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Alterada - Cantina Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --bg-body: #f8fafc;
            --border-color: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body {
            background-color: var(--bg-body);
            background-image: linear-gradient(rgba(248, 250, 252, 0.9), rgba(248, 250, 252, 0.95)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px);
            border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 40px; width: 100%; max-width: 400px; border: 1px solid var(--border-color); text-align: center;
        }
        .login-card h2 { color: var(--primary); font-size: 28px; font-weight: 800; margin-bottom: 15px; }
        .login-card p { color: #64748b; margin-bottom: 25px; font-size: 15px; }
        .btn-primary {
            display: inline-block; width: 100%; background-color: var(--primary); color: white; padding: 14px;
            border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Senha Alterada! ✅</h2>
        <p>Sua senha foi redefinida com sucesso.</p>
        <a href="{% url 'login' %}" class="btn-primary">Fazer Login</a>
    </div>
</body>
</html>
